<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AHMAD Enterprises</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(30, 207, 176, 0.12), transparent 38%),
          radial-gradient(circle at 80% 10%, rgba(212, 168, 67, 0.16), transparent 28%),
          linear-gradient(180deg, #0a0c10 0%, #111318 50%, #0a0c10 100%);
        color: #fff;
        font-family: "DM Sans", system-ui, sans-serif;
      }

      .card {
        max-width: 420px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(24, 28, 36, 0.92);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.34);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>AHMAD is still installed on your device. Reconnect to continue loading live orders, history, and settings.</p>
    </div>
  </body>
</html>
